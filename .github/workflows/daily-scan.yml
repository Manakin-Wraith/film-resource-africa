name: FRA Opportunity Scanner

on:
  schedule:
    - cron: '0 6,18 * * *'   # 8am and 8pm SAST (UTC+2)
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scanner
        run: node scan_opportunities.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
          VAULT_GITHUB_PAT:              ${{ secrets.VAULT_GITHUB_PAT }}
          VAULT_GITHUB_REPO:             ${{ secrets.VAULT_GITHUB_REPO }}

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_id }}
          path: /tmp/scan-*.log
          retention-days: 14
          if-no-files-found: ignore
